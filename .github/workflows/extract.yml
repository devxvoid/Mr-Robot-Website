name: Extract TeleClaw Production Workspace ZIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    env:
      ZIP_FILE: teleclaw-production-workspace.zip

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install unzip and rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip rsync

      - name: Verify ZIP exists
        run: |
          ls -lah
          test -f "$ZIP_FILE"

      - name: Extract ZIP to temp folder
        run: |
          rm -rf extracted
          mkdir -p extracted
          unzip -o "$ZIP_FILE" -d extracted
          find extracted -maxdepth 4 | sed 's#^#- #'

      - name: Copy extracted files to repo root
        run: |
          rsync -av extracted/ ./

      - name: Delete ZIP and temp folder
        run: |
          rm -rf extracted
          rm -f "$ZIP_FILE"

      - name: Show final repo files
        run: |
          ls -lah
          find . -maxdepth 3 | sed 's#^#- #'

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Extract TeleClaw production workspace"
          git push
