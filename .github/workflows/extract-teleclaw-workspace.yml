name: Extract TeleClaw Workspace ZIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    name: Extract ZIP to repo root
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip rsync

      - name: Find and extract TeleClaw ZIP
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE="teleclaw-production-workspace.zip"

          echo "Current repo files:"
          ls -la

          if [ ! -f "$ZIP_FILE" ]; then
            echo "❌ ZIP file not found: $ZIP_FILE"
            echo "Make sure teleclaw-production-workspace.zip is uploaded to the repo root."
            exit 1
          fi

          echo "✅ Found ZIP:"
          ls -lh "$ZIP_FILE"

          echo "📦 ZIP contents:"
          unzip -l "$ZIP_FILE" | head -100

          rm -rf __extract_tmp
          mkdir -p __extract_tmp

          echo "📦 Extracting ZIP to temporary folder..."
          unzip -o "$ZIP_FILE" -d __extract_tmp

          echo "📂 Extracted temp folder:"
          find __extract_tmp -maxdepth 3 -print

          echo "🚚 Copying extracted files to repo root..."
          rsync -av __extract_tmp/ ./

          echo "🧹 Cleaning temporary files and ZIP..."
          rm -rf __extract_tmp
          rm -f "$ZIP_FILE"

          echo "✅ Repo root after extraction:"
          ls -la

      - name: Commit extracted workspace
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Extract TeleClaw production workspace"
          git push
